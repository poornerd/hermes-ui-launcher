name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

# Needed by tauri-action to create/update the GitHub Release on tag pushes.
permissions:
  contents: write

env:
  # Tauri v2 Linux system dependencies. keyring uses the pure-Rust
  # sync-secret-service feature, so libsecret-1-dev is intentionally NOT included.
  LINUX_DEPS: >-
    libwebkit2gtk-4.1-dev
    build-essential
    curl
    wget
    file
    libxdo-dev
    libssl-dev
    libayatana-appindicator3-dev
    librsvg2-dev
    patchelf

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # clippy compiles the tauri crate, which links against webkit on Linux.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $LINUX_DEPS

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: svelte-check
        run: npm run check

      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        # RUSTSEC-2023-0071 (rsa Marvin timing sidechannel) has no fixed release;
        # rsa is pulled transitively via russh/ssh-key for RSA key support and
        # cannot be dropped. Revisit when a patched rsa is published.
        run: cargo audit --file src-tauri/Cargo.lock --ignore RUSTSEC-2023-0071

  # Create the draft Release exactly once before the build matrix fans out.
  # Doing this in a single job avoids the race where parallel matrix legs each
  # create a release for the same tag (draft releases don't enforce unique tags,
  # so concurrent get-or-create can produce duplicate drafts). On branch/PR
  # pushes the step is skipped and release_id is empty -> build-only gate.
  create-release:
    name: Create draft release
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      # Guard against tag/version drift: a v* tag must match the version in
      # tauri.conf.json, Cargo.toml, and package.json, otherwise the installers
      # would be stamped with a version that disagrees with the Release. Runs
      # before the release is created so a mismatch aborts early.
      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          want="${tag#v}"
          conf=$(node -p "require('./src-tauri/tauri.conf.json').version")
          pkg=$(node -p "require('./package.json').version")
          crate=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/^version *= *"([^"]+)".*/\1/')
          rc=0
          for kv in "src-tauri/tauri.conf.json=$conf" "package.json=$pkg" "src-tauri/Cargo.toml=$crate"; do
            f="${kv%%=*}"; v="${kv#*=}"
            if [ "$v" != "$want" ]; then
              echo "::error::$f is version '$v' but tag is '$tag' (expected '$want'); bump it to match before tagging."
              rc=1
            fi
          done
          exit $rc

      - name: Create draft release on tag
        id: create
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Hermes Launcher ${tag}`,
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  build:
    name: Build (${{ matrix.platform }} ${{ matrix.args }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest,   args: "--target aarch64-apple-darwin" }
          - { platform: macos-latest,   args: "--target x86_64-apple-darwin" }
          - { platform: ubuntu-22.04,   args: "" }
          - { platform: windows-latest, args: "" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y $LINUX_DEPS

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.platform }}-${{ matrix.args }}

      # Notarization authenticates with Apple via an App Store Connect API key.
      # The .p8 private key is stored base64-encoded in a secret and written to
      # a file that tauri reads through APPLE_API_KEY_PATH. macOS tag builds only.
      - name: Write App Store Connect API key
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        run: echo "${{ secrets.APPLE_API_KEY_P8_BASE64 }}" | base64 --decode > "${{ runner.temp }}/apple_api_key.p8"

      - name: Build app (and release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Developer ID code signing. Gated to tag builds so PR/branch
          # builds stay unsigned (and fast); empty values disable signing.
          # tauri-action imports the cert into a temp keychain on macOS only;
          # other platforms ignore these.
          APPLE_CERTIFICATE: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_SIGNING_IDENTITY || '' }}
          KEYCHAIN_PASSWORD: ${{ startsWith(github.ref, 'refs/tags/') && secrets.KEYCHAIN_PASSWORD || '' }}
          # Notarization via App Store Connect API key. APPLE_API_KEY_PATH is set
          # only on macOS tag builds, matching the key-write step above; left
          # empty elsewhere so tauri skips notarization.
          APPLE_API_ISSUER: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ startsWith(github.ref, 'refs/tags/') && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_PATH: ${{ (runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/') && secrets.APPLE_API_KEY_P8_BASE64 != '') && format('{0}/apple_api_key.p8', runner.temp) || '' }}
        with:
          args: ${{ matrix.args }}
          # On tag pushes create-release supplies the id of the single draft
          # Release, and every matrix leg uploads its installers into it. On
          # branch/PR pushes release_id is empty -> build-only gate.
          releaseId: ${{ needs.create-release.outputs.release_id }}
